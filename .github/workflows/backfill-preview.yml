name: Production Backfill Preview

on:
  workflow_dispatch: {}

jobs:
  preview:
    name: Run Backfill Preview (Dry Run)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Backfill (Dry Run)
        run: npx tsx scripts/run-backfill.ts > backfill.log 2>&1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DATABASE_URL }}

      - name: Print backfill log on failure
        if: failure()
        run: |
          LOG_CONTENT=$(cat backfill.log | tr '\n' '\r' | sed 's/\r/%0A/g' | sed 's/%/%25/g')
          echo "::warning::Backfill Log: $LOG_CONTENT"
          exit 1
