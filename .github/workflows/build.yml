name: Web Code Verification

on:
  push:
    branches:
      - main
      - master
      - feature/revisao-questoes
  pull_request:
    branches:
      - main
      - master

jobs:
  validate:
    name: Type Check and Compile Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Database Migration (Production Staging)
        run: npx prisma migrate deploy > migration.log 2>&1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DATABASE_URL }}

      - name: Print migration log on failure
        if: failure()
        run: |
          LOG_CONTENT=$(cat migration.log | tr '\n' '\r' | sed 's/\r/%0A/g' | sed 's/%/%25/g')
          echo "::warning::Migration Log: $LOG_CONTENT"
          exit 1

      - name: Verify TypeScript and Build Next.js
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
