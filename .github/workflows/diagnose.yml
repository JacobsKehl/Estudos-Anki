name: Diagnose Active Schedule

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run diagnose script
        env:
          DATABASE_URL: "postgresql://postgres.msmdekjetxajcwuxmxps:EFWAg7wGNgVF4Uc3@aws-1-sa-east-1.pooler.supabase.com:6543/postgres?pgbouncer=true&sslmode=require"
          DIRECT_URL: "postgresql://postgres.msmdekjetxajcwuxmxps:EFWAg7wGNgVF4Uc3@aws-1-sa-east-1.pooler.supabase.com:5432/postgres?sslmode=require"
        run: npx tsx scripts/diagnose-active-schedule.ts > simulation_report.txt

      - name: Commit and push report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add simulation_report.txt
          git commit -m "chore: update simulation report [skip ci]" || echo "No changes to commit"
          git push
